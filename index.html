.card{
  width:100%;max-width:360px;
  background:rgba(255,255,255,.28);
  border:1px solid rgba(255,255,255,.6);
  border-radius:20px;
  padding:clamp(28px,5vw,42px) clamp(20px,5vw,34px);
  backdrop-filter:blur(18px);
  box-shadow:0 4px 40px rgba(0,80,160,.12),inset 0 1px 0 rgba(255,255,255,.7);
}
h2{font-size:clamp(.92rem,2.3vw,1.1rem);font-weight:700;letter-spacing:.04em;text-align:center;margin-bottom:22px;color:#0d2a3e}
input{
  width:100%;background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.8);border-radius:50px;
  padding:12px 20px;color:#0d2a3e;
  font-family:'Rajdhani',sans-serif;font-size:1.05rem;letter-spacing:.12em;
  outline:none;text-align:center;margin-bottom:16px;
  transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
input:focus{border-color:rgba(40,130,220,.5);box-shadow:0 0 0 3px rgba(40,130,220,.12)}
input.err{border-color:rgba(220,50,50,.6);animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
button{
  width:100%;background:linear-gradient(180deg,#5ab8f0,#3a96d8);
  border:none;border-radius:50px;padding:13px 20px;color:white;
  font-family:'Orbitron',sans-serif;font-size:clamp(.86rem,2.1vw,.98rem);
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  box-shadow:0 4px 18px rgba(50,130,210,.35),inset 0 1px 0 rgba(255,255,255,.3);
  transition:filter .15s,transform .1s;
}
button:hover{filter:brightness(1.1)}
button:active{transform:scale(.98)}
.err-msg{font-family:'Share Tech Mono',monospace;font-size:.78rem;letter-spacing:.08em;color:rgba(180,30,30,.85);text-align:center;margin-top:12px;min-height:1.2em;text-transform:uppercase}

<body>
<div class="card">
  <h2>Enter Access Code</h2>
  <input type="password" id="pw" autocomplete="off" placeholder="••••••••" maxlength="32">
  <button id="btn" type="button">Enter</button>
  <p class="err-msg" id="err" aria-live="polite"></p>
</div>
<script>
function setCookie(n,v,h){const e=new Date(Date.now()+h*36e5).toUTCString();document.cookie=n+'='+v+';expires='+e+';path=/;SameSite=Strict';}
function check(){
  if(document.getElementById('pw').value==='G0B!lls'){
    setCookie('hv_auth','granted',24);
    window.location.href='portal.html';
  } else {
    const inp=document.getElementById('pw');
    inp.classList.add('err');
    document.getElementById('err').textContent='Access denied.';
    inp.value='';
    setTimeout(()=>{inp.classList.remove('err');document.getElementById('err').textContent=''},1800);
  }
}
document.getElementById('btn').addEventListener('click',check);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
</script>
</body>
</html>

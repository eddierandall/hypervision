<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#88d5f7">
<meta name="color-scheme" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Hyper Vision Patient Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ══ VARIABLES ══ */
:root{
  --dk-bg:#07090f;
  --dk-border:rgba(180,210,255,.22);
  --dk-border-hi:rgba(200,230,255,.5);
  --dk-txt:#ddeeff;
  --dk-txt-dim:rgba(200,225,255,.55);
  --dk-glow:0 0 18px rgba(120,190,255,.55),0 0 40px rgba(80,160,255,.2);
  --dk-glow-sm:0 0 8px rgba(120,190,255,.4);
}

/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#88d5f7;overscroll-behavior:none}
body{min-height:100vh;min-height:100dvh;font-family:'Rajdhani',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;padding-bottom:env(safe-area-inset-bottom)}

/* ══ PAGE SHELL ══ */
.page{
  position:fixed;top:0;left:0;right:0;bottom:-2px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 20px;
  padding-bottom:max(32px,env(safe-area-inset-bottom));
  overflow:hidden;
}
.page.hidden{display:none}

/* ══ Z-INDEX STACK ══ */
#page-light{z-index:2}

/* ══ PAGE 0 — LIGHT (COUNTDOWN) ══ */
#page-light{
  background:url('images/asset04.jpg') center/cover no-repeat;
  color:#0d2a3e;
}

/* Light page chrome decorations */
.lt-chrome{position:absolute;left:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;pointer-events:none}
.lt-cr{border:1.5px solid rgba(255,255,255,.6);border-radius:10px;background:rgba(255,255,255,.15)}
.lt-cr:nth-child(1){width:42px;height:58px}
.lt-cr:nth-child(2){width:58px;height:78px;margin-left:-8px}
.lt-cr:nth-child(3){width:42px;height:42px;margin-left:6px}
.lt-cr:nth-child(4){width:32px;height:58px;margin-left:2px}

/* Countdown card — no box, just the digits floating */
.lt-countdown-card{position:relative;z-index:1;text-align:center}

/* Countdown digits row */
.lt-cd-row{
  display:flex;align-items:flex-start;justify-content:center;
  gap:clamp(6px,2vw,14px);
  margin-top:4px;
}
.lt-cd-unit{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:clamp(52px,13vw,76px)}
.lt-cd-digits{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(2rem,8vw,3.6rem);
  font-weight:900;
  color:#0d2a3e;
  line-height:1;
  text-shadow:0 2px 8px rgba(0,80,160,.18);
  letter-spacing:.04em;
  transition:color .08s;
}
.lt-cd-label{
  font-family:'Rajdhani',sans-serif;
  font-size:clamp(.58rem,1.6vw,.75rem);
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#1a4a70;
  opacity:.85;
}
.lt-cd-sep{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.8rem,7vw,3rem);
  font-weight:900;
  color:#0d2a3e;
  line-height:1;
  padding-top:2px;
  opacity:.6;
  animation:sepBlink 1s step-end infinite;
}
@keyframes sepBlink{0%,49%{opacity:.6}50%,100%{opacity:.15}}

/* ══ GLITCH SYSTEM — 4 ROTATING TYPES ══════════════════════ */

/* ── Shared overlay base ── */
#lt-glitch-flash{
  position:fixed;inset:0;z-index:100;
  opacity:0;pointer-events:none;transition:none;
}
#lt-glitch-flash::before,
#lt-glitch-flash::after{
  content:'';position:absolute;inset:0;opacity:0;
}

/* ══ TYPE 1: BLOOD VIGNETTE — red bleeds from edges ════════ */
#lt-glitch-flash.g-vignette{
  opacity:1;
  background:radial-gradient(ellipse 80% 70% at 50% 50%,
    rgba(0,0,0,0) 35%,rgba(120,0,0,.95) 100%);
  animation:vignetteBreath 1.2s ease-in-out;
}
@keyframes vignetteBreath{
  0%  {background:radial-gradient(ellipse 80% 70% at 50% 50%,rgba(0,0,0,0) 35%,rgba(120,0,0,.95) 100%)}
  35% {background:radial-gradient(ellipse 55% 50% at 50% 50%,rgba(0,0,0,.5) 15%,rgba(180,0,0,1) 100%)}
  65% {background:radial-gradient(ellipse 62% 57% at 50% 50%,rgba(0,0,0,.3) 25%,rgba(150,0,0,.97) 100%)}
  100%{background:radial-gradient(ellipse 80% 70% at 50% 50%,rgba(0,0,0,0) 35%,rgba(120,0,0,.95) 100%)}
}
#lt-glitch-flash.g-vignette::before{
  opacity:1;
  background:repeating-linear-gradient(0deg,
    transparent 0,transparent 1px,rgba(0,0,0,.6) 1px,rgba(0,0,0,.6) 2px);
  animation:scanRoll .07s linear infinite;
}
@keyframes scanRoll{from{background-position:0 0}to{background-position:0 2px}}
#page-light.g-vignette-tear{
  animation:vTear .9s steps(1);
}
@keyframes vTear{
  0%  {transform:none;filter:none}
  10% {transform:translateX(-10px);filter:brightness(.45) saturate(0)}
  22% {transform:translateX(8px);filter:brightness(.55) saturate(0)}
  38% {transform:translateX(-5px);filter:brightness(.35)}
  55% {transform:translateX(12px);filter:brightness(.5) saturate(0)}
  72% {transform:translateX(-3px);filter:brightness(.65)}
  88% {transform:translateX(4px);filter:brightness(.8)}
  100%{transform:none;filter:none}
}
.lt-cd-digits.g-vignette-digit{
  color:#cc0000;
  text-shadow:3px 0 rgba(255,0,0,.6),-3px 0 rgba(180,0,0,.4),0 0 24px rgba(200,0,0,.9);
  animation:digitScramble .1s steps(1) infinite;
}
.lt-cd-label.g-vignette-label{color:rgba(180,0,0,.8);text-shadow:0 0 8px rgba(180,0,0,.5)}

/* ══ TYPE 2: SIGNAL LOSS — full blackout, bands drop ═══════ */
#lt-glitch-flash.g-blackout{
  opacity:1;
  background:#000;
}
#lt-glitch-flash.g-blackout::before{
  opacity:1;
  background:repeating-linear-gradient(0deg,
    transparent 0,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 3px);
  animation:scanRoll .05s linear infinite;
}
#lt-glitch-flash.g-blackout::after{
  opacity:1;
  background:
    linear-gradient(transparent 0%,rgba(0,80,120,.25) 12%,transparent 14%,
                    transparent 38%,rgba(0,60,100,.3) 42%,transparent 44%,
                    transparent 66%,rgba(0,80,120,.2) 70%,transparent 72%);
  animation:bandDrift .18s steps(3) infinite;
}
@keyframes bandDrift{
  0%  {transform:translateX(0)  ;background-position:0 0}
  33% {transform:translateX(-8px);background-position:0 -30px}
  66% {transform:translateX(6px) ;background-position:0 20px}
  100%{transform:translateX(-3px);background-position:0 -10px}
}
#page-light.g-blackout-tear{
  animation:bTear .6s steps(1);
}
@keyframes bTear{
  0%  {transform:none;filter:none}
  15% {transform:translateX(-18px) scaleY(1.01);filter:brightness(.08) saturate(0)}
  30% {transform:translateX(14px);filter:brightness(.12) saturate(0)}
  50% {transform:translateX(-8px);filter:brightness(.06)}
  70% {transform:translateX(10px);filter:brightness(.1) saturate(0)}
  88% {transform:translateX(-4px);filter:brightness(.3)}
  100%{transform:none;filter:none}
}
.lt-cd-digits.g-blackout-digit{
  color:#006688;
  text-shadow:0 0 16px rgba(0,150,200,.8),0 0 40px rgba(0,100,160,.4);
  animation:digitFlicker .08s steps(1) infinite;
}
.lt-cd-label.g-blackout-label{color:rgba(0,100,150,.8);text-shadow:0 0 6px rgba(0,120,180,.5)}

/* ══ TYPE 3: STROBE — rapid white flashes, disorienting ════ */
#lt-glitch-flash.g-strobe{
  opacity:1;
  background:#fff;
  animation:strobeFlash .55s steps(1);
}
@keyframes strobeFlash{
  0%,100%{background:#fff;opacity:1}
  12%    {background:#000;opacity:1}
  18%    {background:#fff;opacity:1}
  28%    {background:#000;opacity:1}
  35%    {background:#eee;opacity:.9}
  44%    {background:#000;opacity:1}
  52%    {background:#fff;opacity:.8}
  62%    {background:#000;opacity:1}
  72%    {background:#fff;opacity:.6}
  82%    {background:#111;opacity:.8}
  92%    {background:#fff;opacity:.3}
}
#lt-glitch-flash.g-strobe::before{
  opacity:.7;
  background:repeating-linear-gradient(0deg,
    transparent 0,transparent 3px,rgba(0,0,0,.4) 3px,rgba(0,0,0,.4) 4px);
}
#page-light.g-strobe-tear{
  animation:sTear .55s steps(1);
}
@keyframes sTear{
  0%,100%{transform:none;filter:none}
  10%    {transform:translateX(-20px);filter:brightness(2) saturate(0)}
  20%    {transform:translateX(16px);filter:brightness(.1)}
  32%    {transform:translateX(-12px);filter:brightness(2.5) saturate(0)}
  44%    {transform:translateX(8px);filter:brightness(.05)}
  56%    {transform:translateX(-6px);filter:brightness(1.8)}
  68%    {transform:translateX(4px);filter:brightness(.2)}
  82%    {transform:translateX(-2px);filter:brightness(1.2)}
}
.lt-cd-digits.g-strobe-digit{
  color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,1),0 0 50px rgba(200,200,255,.8);
  animation:digitFlicker .06s steps(1) infinite;
}
.lt-cd-label.g-strobe-label{color:rgba(255,255,255,.9);text-shadow:0 0 10px rgba(255,255,255,.8)}

/* ══ TYPE 4: STATIC BLIZZARD — noise texture rolls over ════ */
#lt-glitch-flash.g-static{
  opacity:1;
  background:#1a1a1a;
}
#lt-glitch-flash.g-static::before{
  opacity:1;
  /* Dense interlaced lines */
  background:repeating-linear-gradient(0deg,
    transparent 0,transparent 1px,rgba(255,255,255,.08) 1px,rgba(255,255,255,.08) 2px);
  animation:staticRoll .04s linear infinite;
}
@keyframes staticRoll{from{background-position:0 0}to{background-position:0 2px}}
#lt-glitch-flash.g-static::after{
  opacity:1;
  /* Horizontal smear bands that jump */
  background:
    linear-gradient(transparent 5%,rgba(255,255,255,.07) 8%,transparent 11%,
                    transparent 29%,rgba(255,255,255,.05) 31%,transparent 34%,
                    transparent 58%,rgba(255,255,255,.09) 62%,transparent 65%,
                    transparent 82%,rgba(255,255,255,.06) 85%,transparent 88%);
  animation:staticBands .12s steps(5) infinite;
}
@keyframes staticBands{
  0%  {transform:translateY(0)   scaleX(1)}
  20% {transform:translateY(-15px) scaleX(1.01)}
  40% {transform:translateY(22px) scaleX(.99)}
  60% {transform:translateY(-8px) scaleX(1.02)}
  80% {transform:translateY(12px) scaleX(.98)}
  100%{transform:translateY(-4px) scaleX(1)}
}
#page-light.g-static-tear{
  animation:stTear .7s steps(1);
}
@keyframes stTear{
  0%  {transform:none;filter:none}
  8%  {transform:translateX(-16px) scaleY(1.012);filter:brightness(.3) saturate(0) contrast(2)}
  18% {transform:translateX(12px);filter:brightness(.5) contrast(1.8)}
  30% {transform:translateX(-9px);filter:brightness(.25) saturate(0)}
  44% {transform:translateX(14px);filter:brightness(.4) contrast(2)}
  58% {transform:translateX(-6px);filter:brightness(.35)}
  72% {transform:translateX(5px);filter:brightness(.55) saturate(0)}
  86% {transform:translateX(-2px);filter:brightness(.75)}
  100%{transform:none;filter:none}
}
.lt-cd-digits.g-static-digit{
  color:#ccc;
  text-shadow:2px 0 rgba(255,80,80,.5),-2px 0 rgba(80,255,255,.5),0 0 12px rgba(200,200,200,.7);
  animation:digitScramble .09s steps(1) infinite;
}
.lt-cd-label.g-static-label{color:rgba(180,180,180,.7);text-shadow:0 0 5px rgba(150,150,150,.4)}

/* ══ TYPE 5: FLATLINE — green phosphor monitor, heart stops ═ */
#lt-glitch-flash.g-flatline{
  opacity:1;
  background:#000;
}
#lt-glitch-flash.g-flatline::before{
  opacity:1;
  background:repeating-linear-gradient(0deg,
    transparent 0,transparent 1px,rgba(0,40,0,.9) 1px,rgba(0,40,0,.9) 2px);
  animation:scanRoll .06s linear infinite;
}
#lt-glitch-flash.g-flatline::after{
  opacity:1;
  /* Green phosphor glow bands */
  background:
    linear-gradient(transparent 0%,rgba(0,180,0,.12) 15%,transparent 18%,
                    transparent 48%,rgba(0,200,0,.08) 51%,transparent 54%,
                    transparent 80%,rgba(0,160,0,.1) 83%,transparent 86%);
  animation:phosphorDrift .3s steps(3) infinite;
}
@keyframes phosphorDrift{
  0%  {transform:translateY(0)}
  33% {transform:translateY(-12px)}
  66% {transform:translateY(18px)}
  100%{transform:translateY(-6px)}
}
#page-light.g-flatline-tear{
  animation:flTear 1.0s steps(1);
}
@keyframes flTear{
  0%  {transform:none;filter:none}
  6%  {transform:translateX(-8px);filter:brightness(.08) saturate(0) hue-rotate(100deg)}
  14% {transform:translateX(6px); filter:brightness(.12) saturate(0)}
  24% {transform:translateX(-4px);filter:brightness(.06)}
  36% {transform:translateX(8px); filter:brightness(.1) saturate(0)}
  50% {transform:translateX(-5px);filter:brightness(.08)}
  64% {transform:translateX(4px); filter:brightness(.14) saturate(0)}
  78% {transform:translateX(-2px);filter:brightness(.3)}
  90% {transform:translateX(2px); filter:brightness(.6)}
  100%{transform:none;filter:none}
}
.lt-cd-digits.g-flatline-digit{
  color:#00cc44;
  text-shadow:0 0 14px rgba(0,220,60,.9),0 0 35px rgba(0,180,40,.5),2px 0 rgba(0,255,80,.3);
  animation:digitFlicker .14s steps(1) infinite;
}
.lt-cd-label.g-flatline-label{color:rgba(0,180,50,.8);text-shadow:0 0 6px rgba(0,200,60,.5)}

/* ══ TYPE 6: RGB SPLIT — chromatic tear, signal decomposing ═ */
#lt-glitch-flash.g-rgb{
  opacity:1;
  background:rgba(0,0,0,.92);
}
#lt-glitch-flash.g-rgb::before{
  opacity:1;
  background:repeating-linear-gradient(0deg,
    rgba(255,0,0,.06) 0,rgba(255,0,0,.06) 1px,
    rgba(0,255,0,.04) 1px,rgba(0,255,0,.04) 2px,
    rgba(0,0,255,.06) 2px,rgba(0,0,255,.06) 3px,
    transparent 3px,transparent 4px);
  animation:rgbScan .05s linear infinite;
}
@keyframes rgbScan{from{background-position:0 0}to{background-position:0 4px}}
#lt-glitch-flash.g-rgb::after{
  opacity:1;
  background:
    linear-gradient(transparent 10%,rgba(255,0,0,.15) 12%,transparent 14%,
                    transparent 35%,rgba(0,255,0,.1) 37%,transparent 39%,
                    transparent 62%,rgba(0,0,255,.15) 64%,transparent 66%);
  animation:rgbDrift .16s steps(4) infinite;
}
@keyframes rgbDrift{
  0%  {transform:translateX(0)   skewY(0)}
  25% {transform:translateX(-9px) skewY(.4deg)}
  50% {transform:translateX(7px)  skewY(-.3deg)}
  75% {transform:translateX(-4px) skewY(.2deg)}
  100%{transform:translateX(5px)  skewY(0)}
}
#page-light.g-rgb-tear{
  animation:rgbTear .65s steps(1);
}
@keyframes rgbTear{
  0%  {transform:none;filter:none}
  10% {transform:translateX(-16px);filter:brightness(.5) hue-rotate(90deg) saturate(3)}
  20% {transform:translateX(12px); filter:brightness(.4) hue-rotate(180deg)}
  32% {transform:translateX(-10px);filter:brightness(.6) hue-rotate(270deg) saturate(2)}
  45% {transform:translateX(8px);  filter:brightness(.3) saturate(0)}
  58% {transform:translateX(-6px); filter:brightness(.5) hue-rotate(45deg)}
  72% {transform:translateX(4px);  filter:brightness(.7) saturate(1.5)}
  86% {transform:translateX(-2px); filter:brightness(.85)}
  100%{transform:none;filter:none}
}
.lt-cd-digits.g-rgb-digit{
  color:#fff;
  text-shadow:
    -4px 0 rgba(255,0,0,.8),
    4px  0 rgba(0,255,255,.8),
    0 0 20px rgba(255,255,255,.6);
  animation:digitScramble .09s steps(1) infinite;
}
.lt-cd-label.g-rgb-label{
  color:rgba(255,255,255,.8);
  text-shadow:-2px 0 rgba(255,0,0,.5), 2px 0 rgba(0,255,255,.5);
}

/* ══ SHARED DIGIT ANIMATIONS ════════════════════════════════ */
@keyframes digitScramble{
  0%  {transform:translateX(0)    skewX(0)     scaleY(1)}
  20% {transform:translateX(-5px) skewX(2deg)  scaleY(1.015)}
  40% {transform:translateX(7px)  skewX(-1.5deg) scaleY(.985)}
  60% {transform:translateX(-3px) skewX(1deg)  scaleY(1.01)}
  80% {transform:translateX(4px)  skewX(-2deg) scaleY(.99)}
  100%{transform:translateX(0)    skewX(0)     scaleY(1)}
}
@keyframes digitFlicker{
  0%,100%{opacity:1} 33%{opacity:.2} 66%{opacity:.8}
}

/* ══ VOLUME BUTTON ══ */
#vol-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;
  border-radius:50%;
  border:1.5px solid rgba(13,42,62,.35);
  background:rgba(255,255,255,.28);
  backdrop-filter:blur(10px);
  cursor:pointer;
  margin-top:14px;
  margin-left:auto;        /* right-align within card */
  position:relative;
  transition:background .18s, border-color .18s, transform .12s;
  -webkit-tap-highlight-color:transparent;
}
#vol-btn:hover{background:rgba(255,255,255,.45);border-color:rgba(13,42,62,.55);transform:scale(1.08)}
#vol-btn:active{transform:scale(.95)}
#vol-btn svg{width:17px;height:17px;fill:none;stroke:#0d2a3e;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
/* Muted state */
#vol-btn.muted{border-color:rgba(13,42,62,.2);background:rgba(255,255,255,.14)}
#vol-btn.muted svg{stroke:rgba(13,42,62,.45)}
/* Tooltip */
#vol-btn::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 8px);right:0;
  background:rgba(13,42,62,.88);color:#fff;
  font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;
  padding:5px 10px;border-radius:6px;
  opacity:0;pointer-events:none;
  transform:translateY(4px);
  transition:opacity .18s,transform .18s;
}
#vol-btn:hover::after{opacity:1;transform:translateY(0)}

/* ══ RESPONSIVE ══ */
@media(max-width:540px){.lt-chrome{display:none}}
@media(max-width:360px){.lt-countdown-card{padding:16px 12px}}
</style>
</head>
<body>

<!-- ══ GLITCH DARK-FLASH OVERLAY ══ -->
<div id="lt-glitch-flash" aria-hidden="true"></div>

<!-- PAGE 0: COUNTDOWN (LIGHT) -->
<div class="page" id="page-light">
  <div class="lt-chrome" aria-hidden="true">
    <div class="lt-cr"></div><div class="lt-cr"></div>
    <div class="lt-cr"></div><div class="lt-cr"></div>
  </div>

  <div class="lt-countdown-card" role="timer" aria-label="Countdown timer">
    <div class="lt-cd-row">
      <div class="lt-cd-unit">
        <span class="lt-cd-digits" id="cd-days">00</span>
        <span class="lt-cd-label">Days</span>
      </div>
      <span class="lt-cd-sep" aria-hidden="true">:</span>
      <div class="lt-cd-unit">
        <span class="lt-cd-digits" id="cd-hours">00</span>
        <span class="lt-cd-label">Hours</span>
      </div>
      <span class="lt-cd-sep" aria-hidden="true">:</span>
      <div class="lt-cd-unit">
        <span class="lt-cd-digits" id="cd-mins">00</span>
        <span class="lt-cd-label">Minutes</span>
      </div>
      <span class="lt-cd-sep" aria-hidden="true">:</span>
      <div class="lt-cd-unit">
        <span class="lt-cd-digits" id="cd-secs">00</span>
        <span class="lt-cd-label">Seconds</span>
      </div>
    </div>
    <!-- Volume button — right-aligned under the timer row -->
    <button id="vol-btn" class="muted" data-tip="Enable Sound" aria-label="Enable sound">
      <svg id="vol-icon-off" viewBox="0 0 24 24">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
      <svg id="vol-icon-on" viewBox="0 0 24 24" style="display:none">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>
  </div>
</div><!-- /page-light -->

<!--
════════════════════════════════════════════════════════════════

<script>
(function(){
  'use strict';

  /* ══ COUNTDOWN ══════════════════════════════════════════════
     Target: June 3, 2026 at 8:00 AM EST (UTC-5)
     UTC equivalent: June 3, 2026 13:00:00 UTC                */
  const TARGET = new Date('2026-06-03T13:00:00Z');

  const elDays  = document.getElementById('cd-days');
  const elHours = document.getElementById('cd-hours');
  const elMins  = document.getElementById('cd-mins');
  const elSecs  = document.getElementById('cd-secs');
  const allDigits = [elDays, elHours, elMins, elSecs];
  const allLabels = document.querySelectorAll('.lt-cd-label');

  function pad(n){ return String(Math.max(0,n)).padStart(2,'0'); }

  function tick(){
    const diff = TARGET - Date.now();
    if(diff <= 0){ allDigits.forEach(el=>el.textContent='00'); return; }
    const s = Math.floor(diff/1000);
    elDays.textContent  = pad(Math.floor(s/86400));
    elHours.textContent = pad(Math.floor((s%86400)/3600));
    elMins.textContent  = pad(Math.floor((s%3600)/60));
    elSecs.textContent  = pad(s%60);
  }
  tick();
  setInterval(tick,1000);

  /* ══ AUDIO ENGINE ════════════════════════════════════════════
     Web Audio API — all synthesis, no files.
     Unlocks on first user interaction.                        */
  let actx = null;
  let audioReady = false;

  function initAudio(){
    if(audioReady) return;
    actx = new (window.AudioContext||window.webkitAudioContext)();
    audioReady = true;
    startHeartbeat();
  }

  /* ══ VOLUME BUTTON ══ */
  const volBtn     = document.getElementById('vol-btn');
  const iconOff    = document.getElementById('vol-icon-off');
  const iconOn     = document.getElementById('vol-icon-on');
  let soundEnabled = false;

  volBtn.addEventListener('click', ()=>{
    soundEnabled = !soundEnabled;
    if(soundEnabled){
      initAudio();
      volBtn.classList.remove('muted');
      volBtn.setAttribute('data-tip','Disable Sound');
      volBtn.setAttribute('aria-label','Disable sound');
      iconOff.style.display = 'none';
      iconOn.style.display  = '';
      if(audioReady && hbSuppressed) resumeHeartbeat(0);
    } else {
      volBtn.classList.add('muted');
      volBtn.setAttribute('data-tip','Enable Sound');
      volBtn.setAttribute('aria-label','Enable sound');
      iconOff.style.display = '';
      iconOn.style.display  = 'none';
      stopHeartbeat();
    }
  });

  /* Convenience: create a gain node at master output */
  function out(vol){
    const g = actx.createGain();
    g.gain.value = vol;
    g.connect(actx.destination);
    return g;
  }

  /* Reusable 2-second noise buffer */
  let _noiseBuf = null;
  function noiseBuf(){
    if(_noiseBuf) return _noiseBuf;
    _noiseBuf = actx.createBuffer(1, actx.sampleRate*2, actx.sampleRate);
    const d = _noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    return _noiseBuf;
  }

  /* ══ SOUND 1: Deep cardiac thud + fluorescent hum (vignette) */
  function sndVignette(durationSec){
    if(!audioReady||!soundEnabled) return;
    const now = actx.currentTime;
    /* Sub-bass thud — felt in the chest */
    const osc = actx.createOscillator();
    osc.type='sine';
    osc.frequency.setValueAtTime(80,now);
    osc.frequency.exponentialRampToValueAtTime(22,now+0.25);
    const tEnv = actx.createGain();
    tEnv.gain.setValueAtTime(1,now);
    tEnv.gain.exponentialRampToValueAtTime(0.001,now+0.28);
    osc.connect(tEnv); tEnv.connect(out(0.22));
    osc.start(now); osc.stop(now+0.3);
    /* Detuned fluorescent hum holds through the event */
    [59.7,60.4].forEach(freq=>{
      const h=actx.createOscillator(); h.type='sawtooth'; h.frequency.value=freq;
      const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=280; lp.Q.value=1.2;
      const hEnv=actx.createGain();
      hEnv.gain.setValueAtTime(0,now);
      hEnv.gain.linearRampToValueAtTime(0.5,now+0.1);
      hEnv.gain.setValueAtTime(0.5,now+durationSec-0.15);
      hEnv.gain.linearRampToValueAtTime(0,now+durationSec);
      h.connect(lp); lp.connect(hEnv); hEnv.connect(out(0.11));
      h.start(now); h.stop(now+durationSec+0.05);
    });
  }

  /* ══ SOUND 2: Power-death drone — descending sine (blackout) */
  function sndBlackout(durationSec){
    if(!audioReady||!soundEnabled) return;
    const now = actx.currentTime;
    /* Descending tone — like a machine losing power */
    const osc=actx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(200,now);
    osc.frequency.exponentialRampToValueAtTime(30,now+durationSec);
    const env=actx.createGain();
    env.gain.setValueAtTime(0,now);
    env.gain.linearRampToValueAtTime(0.7,now+0.06);
    env.gain.setValueAtTime(0.7,now+durationSec*0.65);
    env.gain.exponentialRampToValueAtTime(0.001,now+durationSec);
    const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=450;
    osc.connect(lp); lp.connect(env); env.connect(out(0.15));
    osc.start(now); osc.stop(now+durationSec+0.05);
    /* Thin underlying noise bed */
    const ns=actx.createBufferSource(); ns.buffer=noiseBuf(); ns.loop=true;
    const nbp=actx.createBiquadFilter(); nbp.type='bandpass'; nbp.frequency.value=500; nbp.Q.value=0.5;
    const nEnv=actx.createGain();
    nEnv.gain.setValueAtTime(0.35,now);
    nEnv.gain.linearRampToValueAtTime(0,now+durationSec);
    ns.connect(nbp); nbp.connect(nEnv); nEnv.connect(out(0.08));
    ns.start(now); ns.stop(now+durationSec);
  }

  /* ══ SOUND 3: Electrical crack + dropping squeal (strobe) ══ */
  function sndStrobe(){
    if(!audioReady||!soundEnabled) return;
    const now = actx.currentTime;
    /* High-freq noise crack */
    const ns=actx.createBufferSource(); ns.buffer=noiseBuf(); ns.loop=true;
    const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=3500;
    const nEnv=actx.createGain();
    nEnv.gain.setValueAtTime(0,now);
    nEnv.gain.linearRampToValueAtTime(1,now+0.005);
    nEnv.gain.exponentialRampToValueAtTime(0.001,now+0.16);
    ns.connect(hp); hp.connect(nEnv); nEnv.connect(out(0.18));
    ns.start(now); ns.stop(now+0.18);
    /* Square wave squeal that pitches down */
    const sq=actx.createOscillator(); sq.type='square';
    sq.frequency.setValueAtTime(2400,now);
    sq.frequency.exponentialRampToValueAtTime(380,now+0.28);
    const sEnv=actx.createGain();
    sEnv.gain.setValueAtTime(0.5,now);
    sEnv.gain.exponentialRampToValueAtTime(0.001,now+0.28);
    const slp=actx.createBiquadFilter(); slp.type='lowpass'; slp.frequency.value=1600;
    sq.connect(slp); slp.connect(sEnv); sEnv.connect(out(0.07));
    sq.start(now); sq.stop(now+0.3);
  }

  /* ══ SOUND 4: AM-modulated static blizzard (static glitch) ═ */
  function sndStatic(durationSec){
    if(!audioReady||!soundEnabled) return;
    const now = actx.currentTime;
    const ns=actx.createBufferSource(); ns.buffer=noiseBuf(); ns.loop=true;
    const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100; bp.Q.value=0.7;
    const env=actx.createGain();

    env.gain.linearRampToValueAtTime(0.85,now+0.04);
    env.gain.setValueAtTime(0.85,now+durationSec-0.1);
    env.gain.linearRampToValueAtTime(0,now+durationSec);

    const lfoG=actx.createGain(); lfoG.gain.value=0.28;

    ns.connect(bp); bp.connect(env); env.connect(out(0.13));
    ns.start(now); ns.stop(now+durationSec+0.05);
    lfo.start(now); lfo.stop(now+durationSec+0.05);
  }

  function sndFlatline(durationSec){
    if(!audioReady||!soundEnabled) return;
    const now = actx.currentTime;
    /* Classic 1kHz flatline sine — but low and wrong-pitched */
    const osc=actx.createOscillator(); osc.type='sine'; osc.frequency.value=520;
    const env=actx.createGain();
    env.gain.setValueAtTime(0,now);
    env.gain.linearRampToValueAtTime(0.55,now+0.04);
    /* Subtle amplitude wobble — not quite steady */
    const lfo=actx.createOscillator(); lfo.frequency.value=3.5;
    const lfoG=actx.createGain(); lfoG.gain.value=0.08;
    lfo.connect(lfoG); lfoG.connect(env.gain);
    env.gain.setValueAtTime(0.55,now+durationSec-0.12);
    env.gain.linearRampToValueAtTime(0,now+durationSec);
    const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=700;
    osc.connect(lp); lp.connect(env); env.connect(out(0.12));
    osc.start(now); osc.stop(now+durationSec+0.05);
    lfo.start(now); lfo.stop(now+durationSec+0.05);
    /* Distant low drone underneath */
    const d=actx.createOscillator(); d.type='sawtooth'; d.frequency.value=41;
    const dEnv=actx.createGain();
    dEnv.gain.setValueAtTime(0,now);
    dEnv.gain.linearRampToValueAtTime(0.4,now+0.1);
    dEnv.gain.linearRampToValueAtTime(0,now+durationSec);
    const dlp=actx.createBiquadFilter(); dlp.type='lowpass'; dlp.frequency.value=120;
    d.connect(dlp); dlp.connect(dEnv); dEnv.connect(out(0.1));
    d.start(now); d.stop(now+durationSec+0.05);
  }

  /* ══ SOUND 6: RGB/decomp — sweeping resonant filter on noise */
  function sndRgb(durationSec){
    if(!audioReady||!soundEnabled) return;
    const now = actx.currentTime;
    /* Noise through a sweeping bandpass — alien interference */
    const ns=actx.createBufferSource(); ns.buffer=noiseBuf(); ns.loop=true;
    const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=4;
    bp.frequency.setValueAtTime(800,now);
    bp.frequency.exponentialRampToValueAtTime(4000,now+durationSec*0.5);
    bp.frequency.exponentialRampToValueAtTime(200,now+durationSec);
    const env=actx.createGain();
    env.gain.setValueAtTime(0,now);
    env.gain.linearRampToValueAtTime(0.9,now+0.03);
    env.gain.setValueAtTime(0.9,now+durationSec-0.1);
    env.gain.linearRampToValueAtTime(0,now+durationSec);
    ns.connect(bp); bp.connect(env); env.connect(out(0.14));
    ns.start(now); ns.stop(now+durationSec+0.05);
    /* Detuned oscillator pair for the chromatic wrongness */
    [220,221.8].forEach(f=>{
      const o=actx.createOscillator(); o.type='triangle'; o.frequency.value=f;
      const e=actx.createGain();
      e.gain.setValueAtTime(0,now);
      e.gain.linearRampToValueAtTime(0.3,now+0.08);
      e.gain.linearRampToValueAtTime(0,now+durationSec);
      o.connect(e); e.connect(out(0.07));
      o.start(now); o.stop(now+durationSec+0.05);
    });
  }

  /* ══ HEARTBEAT — Lub-dub sine double-thud at ~62bpm. Starts after first tap. ══ */
  let hbTimeout = null;
  let hbSuppressed = false;

  function heartbeatPulse(){
    if(!audioReady || hbSuppressed || !soundEnabled) return;
    const now = actx.currentTime;
    function beat(t,freq,decay,vol){
      const o=actx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(freq,t);
      o.frequency.exponentialRampToValueAtTime(freq*0.28,t+decay);
      const e=actx.createGain();
      e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(1,t+0.01);
      e.gain.exponentialRampToValueAtTime(0.001,t+decay);
      const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=180;
      o.connect(lp); lp.connect(e); e.connect(out(vol));
      o.start(t); o.stop(t+decay+0.02);
    }
    beat(now,      60, 0.20, 0.32);   /* lub — louder */
    beat(now+0.16, 50, 0.24, 0.26);   /* dub — louder */
    hbTimeout = setTimeout(heartbeatPulse, 960);   /* ~62.5 bpm */
  }

  function startHeartbeat(){ hbSuppressed=false; heartbeatPulse(); }
  function stopHeartbeat() { hbSuppressed=true;  clearTimeout(hbTimeout); }
  function resumeHeartbeat(delay){ setTimeout(()=>{ hbSuppressed=false; heartbeatPulse(); }, delay); }

  /* ══ GLITCH SYSTEM — 6 TYPES, WEIGHTED RANDOM ══════════════ */
  const flash  = document.getElementById('lt-glitch-flash');
  const pageLt = document.getElementById('page-light');

  /* weight: higher = more likely to fire */
  const GLITCHES = [
    {
      id:'vignette', weight:3,
      overlayClass:'g-vignette', tearClass:'g-vignette-tear',
      digitClass:'g-vignette-digit', labelClass:'g-vignette-label',
      holdMin:900, holdRange:700,
      sound: dur => sndVignette(dur/1000)
    },
    {
      id:'blackout', weight:2,
      overlayClass:'g-blackout', tearClass:'g-blackout-tear',
      digitClass:'g-blackout-digit', labelClass:'g-blackout-label',
      holdMin:700, holdRange:600,
      sound: dur => sndBlackout(dur/1000)
    },
    {
      id:'strobe', weight:2,
      overlayClass:'g-strobe', tearClass:'g-strobe-tear',
      digitClass:'g-strobe-digit', labelClass:'g-strobe-label',
      holdMin:480, holdRange:200,
      sound: () => sndStrobe()
    },
    {
      id:'static', weight:2,
      overlayClass:'g-static', tearClass:'g-static-tear',
      digitClass:'g-static-digit', labelClass:'g-static-label',
      holdMin:750, holdRange:500,
      sound: dur => sndStatic(dur/1000)
    },
    {
      id:'flatline', weight:2,
      overlayClass:'g-flatline', tearClass:'g-flatline-tear',
      digitClass:'g-flatline-digit', labelClass:'g-flatline-label',
      holdMin:1000, holdRange:800,
      sound: dur => sndFlatline(dur/1000)
    },
    {
      id:'rgb', weight:1,
      overlayClass:'g-rgb', tearClass:'g-rgb-tear',
      digitClass:'g-rgb-digit', labelClass:'g-rgb-label',
      holdMin:600, holdRange:400,
      sound: dur => sndRgb(dur/1000)
    }
  ];

  /* Build weighted pool */
  const weightedPool = GLITCHES.flatMap(g => Array(g.weight).fill(g));
  let lastIdx = -1;

  function pickGlitch(){
    /* Shuffle via weighted pool, never same type twice in a row */
    let pick, idx;
    do {
      idx = Math.floor(Math.random()*weightedPool.length);
      pick = weightedPool[idx];
    } while(pick.id === (GLITCHES[lastIdx]||{}).id);
    lastIdx = GLITCHES.indexOf(pick);
    return pick;
  }

  function clearGlitch(g){
    flash.className = '';
    pageLt.classList.remove(g.tearClass);
    allDigits.forEach(el=>el.classList.remove(g.digitClass));
    allLabels.forEach(el=>el.classList.remove(g.labelClass));
  }

  function doGlitch(){
    const g = pickGlitch();
    const targets = allDigits.filter(()=>Math.random()>.2);
    const holdDur = g.holdMin + Math.random()*g.holdRange;

    /* Phase 1: hit */
    stopHeartbeat();
    flash.className = g.overlayClass;
    pageLt.classList.add(g.tearClass);
    targets.forEach(el=>el.classList.add(g.digitClass));
    allLabels.forEach(el=>el.classList.add(g.labelClass));
    g.sound(holdDur);

    /* Phase 2: recover with aftershocks */
    setTimeout(()=>{
      clearGlitch(g);

      const spikes = 2 + Math.floor(Math.random()*2);
      let t = 80;
      for(let i=0;i<spikes;i++){
        const onDur  = 55 + Math.random()*160;
        const offGap = 60 + Math.random()*140;
        setTimeout(()=>{
          flash.className = g.overlayClass;
          pageLt.classList.add(g.tearClass);
        }, t);
        setTimeout(()=>{
          flash.className = '';
          pageLt.classList.remove(g.tearClass);
        }, t+onDur);
        t += onDur + offGap;
      }

      setTimeout(()=>{
        targets.forEach(el=>el.classList.remove(g.digitClass));
        allLabels.forEach(el=>el.classList.remove(g.labelClass));
        resumeHeartbeat(350);
      }, t+80);

    }, holdDur);
  }

  function scheduleNextGlitch(){
    const delay = 3000 + Math.random()*5000;
    setTimeout(()=>{ doGlitch(); scheduleNextGlitch(); }, delay);
  }

  /* First glitch: 3–6 seconds after load */
  setTimeout(scheduleNextGlitch, 3000 + Math.random()*3000);

})();
</script>
